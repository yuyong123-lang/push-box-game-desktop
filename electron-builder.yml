appId: com.push-box-game.desktop
productName: "push-box-game"
directories:
  output: release
  buildResources: public
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: public/levels.json
    to: levels.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/images/icon.ico
  signAndEditExecutable: false
  artifactName: "${productName}-${version}-setup.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "推箱子"
  installerLanguages:
    - zh-CN
    - en-US
  language: "2052"
mac:
  target: dmg
  icon: public/images/icon.png
linux:
  target: AppImage
  icon: public/images/icon.png
