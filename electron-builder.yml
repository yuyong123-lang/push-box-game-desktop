appId: com.push-box-game.desktop
productName: "push-box-game"
directories:
  output: release
  buildResources: public
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: public/levels.json
    to: levels.json
win:
  target:
    - target: dir
      arch:
        - x64
  icon: public/images/icon.png
  signAndEditExecutable: false
  artifactName: "${productName}-${version}.${ext}"
mac:
  target: dmg
  icon: public/images/icon.png
linux:
  target: AppImage
  icon: public/images/icon.png
